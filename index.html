<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专属爱心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: "Microsoft Yahei", sans-serif;
        }
        .heart-container {
            position: relative;
            text-align: center;
        }
        #heart {
            font-size: 10rem;
            color: #ff6b9d;
            animation: beat 1s infinite alternate;
            transition: color 0.3s;
        }
        @keyframes beat {
            to { transform: scale(1.1); }
        }
        #name {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255,107,157,0.8);
        }
    </style>
</head>
<body>
    <div class="heart-container">
        <div id="heart">❤️</div>
        <div id="name">输入你想显示的名字</div>
    </div>
    <script>
        // 可以在这里修改名字
        const yourName = "泡芙"; // 把这里改成你想显示的名字
        document.getElementById("name").textContent = yourName;

        // 颜色渐变效果
        let hue = 0;
        setInterval(() => {
            hue = (hue + 2) % 360;
            document.getElementById("heart").style.color = `hsl(${hue}, 100%, 65%)`;
        }, 50);
    </script>
</body>
</html>
